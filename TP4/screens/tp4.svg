  <text x="20" y="20" font-family="monospace" font-size="13" fill="#4ec9b0">$ docker build -t my-python-server .</text>
  <text x="20" y="40" font-family="monospace" font-size="13" fill="#d4d4d4">Step 1/5 : FROM python:3.13-slim</text>
  <text x="20" y="60" font-family="monospace" font-size="13" fill="#d4d4d4"> ---&gt; a1b2c3d4e5f6</text>
  <text x="20" y="80" font-family="monospace" font-size="13" fill="#d4d4d4">Step 2/5 : ENV PORT=80</text>
